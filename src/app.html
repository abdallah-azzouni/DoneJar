<!doctype html>
<html lang="en">
	<head>
		<!-- Cloudflare Web Analytics -->
		<script
			defer
			src="https://static.cloudflareinsights.com/beacon.min.js"
			data-cf-beacon='{"token": "%sveltekit.env.PUBLIC_CF_BEACON_TOKEN%"}'
		></script>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<meta name="google-site-verification" content="dW4LrczaxJvrAgOaM2LghtmHHVR4gvqdzMLvr1wAs8I" />
		<!-- Google Search Console -->

		<meta property="og:site_name" content="DoneJar" />
		<meta property="og:title" content="DoneJar" />
		<meta
			name="description"
			content="DoneJar is a kanban-style task manager with TODO, DOING, and JAR columns, featuring a handwritten, paper-like aesthetic for simple, visual task tracking."
		/>

		<title>DoneJar - Track and organize your tasks</title>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
